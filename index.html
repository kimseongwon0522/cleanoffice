<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>클린 오피스 — 영업 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4eee3;--panel:#fffaf2;--panel2:#f7efe0;--line:#ecdfc9;--navy:#f7efe0;--blue:#d97706;--blue2:#b45309;--txt:#3a322a;--mut:#8a7d6a;--green:#15803d;--yellow:#b45309;--red:#dc2626}
body{background:var(--bg);color:var(--txt);font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px}
.hide{display:none!important}
input,select,button{font-family:inherit}
input,select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 11px;font-size:13px}
.btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 15px;font-size:13px;cursor:pointer;font-weight:600}
.btn.sm{padding:5px 10px;font-size:12px}.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--mut)}
/* center cards (setup/login) */
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.cardbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:28px;width:380px}
.cardbox h2{color:var(--blue2);font-size:20px;margin-bottom:4px}
.cardbox p{color:var(--mut);font-size:12.5px;margin-bottom:16px;line-height:1.6}
.cardbox label{display:block;font-size:12px;color:var(--mut);margin:10px 0 4px}
.cardbox input{width:100%}
.cardbox .btn{width:100%;margin-top:16px}
.err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}
/* app shell */
.app{display:flex;min-height:100vh}
.side{width:200px;background:#efe7d8;border-right:1px solid #e2d6c2;flex-shrink:0;padding:18px 0}
.logo{font-size:18px;font-weight:800;color:var(--blue2);padding:0 20px 4px}
.logo small{display:block;font-size:11px;color:var(--mut);font-weight:400}
.nav{margin-top:14px;padding:0 10px}
.nav a{display:flex;align-items:center;gap:9px;padding:9px 12px;color:var(--mut);font-size:13.5px;border-radius:8px;cursor:pointer;margin-bottom:2px}
.nav a i{font-size:18px}
.nav a:hover{background:#fff7ec;color:var(--txt)}.nav a.on{background:var(--blue);color:#fff;font-weight:600}
.seg{font-size:12px;padding:5px 11px;border-radius:6px;color:var(--mut);cursor:pointer}
.seg.on{background:var(--panel);color:var(--txt);font-weight:600}
.smode{display:inline-block;font-size:13px;padding:6px 18px;border-radius:6px;color:var(--mut);cursor:pointer}
.smode.on{background:#c2410c;color:#fff;font-weight:600}
.kpi{background:var(--panel2);border-radius:12px;padding:14px 16px}
.kl{font-size:12px;color:var(--mut);margin-bottom:6px}.kv{font-size:23px;font-weight:800;display:flex;align-items:baseline;gap:8px}.kv.g{color:var(--green)}.kx{font-size:11px;color:var(--mut);margin-top:5px}
.chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fde7d3;color:#9a3412}.chip.g{background:#e1f3e8;color:#15803d}
.nav .grp{font-size:11px;color:#5b6675;padding:14px 12px 4px}
.logout{position:absolute;bottom:14px;left:20px;font-size:12px;color:var(--mut);cursor:pointer}
.main{flex:1;padding:24px 30px;overflow:auto;max-height:100vh}
h1{font-size:21px;margin-bottom:2px}.sub{color:var(--mut);font-size:12.5px;margin-bottom:18px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 17px}
.card.hero{background:#d97706;border-color:#d97706}
.card .k{font-size:12px;color:var(--mut)}.card .v{font-size:25px;font-weight:800;margin-top:5px}
.v.b{color:var(--blue2)}.v.g{color:var(--green)}.v.y{color:var(--yellow)}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
table{width:100%;border-collapse:collapse;background:var(--panel);border-radius:12px;overflow:hidden}
th,td{padding:9px 11px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
th{background:var(--navy);color:#8a7d6a;font-size:12px}
tr:hover td{background:var(--panel2)}
.tag{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.대형{background:#ffedd5;color:#c2410c}.중형{background:#fef3c7;color:#92400e}.소형{background:#f1ebe0;color:#78716c}.미상{background:#eee;color:#999}
.st{font-size:12px;border-radius:6px;padding:5px;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut)}
.badge b{color:var(--blue2)}.badge.g b{color:var(--green)}
.box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.box h3{font-size:14px;margin-bottom:10px;color:var(--blue2)}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.del{color:var(--red);cursor:pointer}.link{color:var(--blue2);cursor:pointer}
.toast{position:fixed;bottom:18px;right:18px;background:var(--green);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.loading{color:var(--mut);padding:40px;text-align:center}
</style></head>
<body>

<!-- 1) Supabase 키 설정 -->
<div id="setup" class="center hide">
  <div class="cardbox">
    <h2>클린 오피스</h2>
    <p>처음 한 번만 연결합니다.<br>Supabase <b>Project Settings → API Keys</b> 에서 <b>"Publishable key"</b>(sb_publishable_…)를 복사해 붙여넣으세요. ※ Secret key는 쓰면 안 돼요. (Project URL은 이미 넣어뒀어요)</p>
    <label>Publishable key</label>
    <input id="anonKey" placeholder="sb_publishable_... (또는 eyJ...)">
    <button class="btn" onclick="saveKey()">연결</button>
    <div class="err" id="setupErr"></div>
  </div>
</div>

<!-- 2) 로그인 -->
<div id="login" class="center hide">
  <div class="cardbox">
    <h2>클린 오피스</h2>
    <p>사장님은 <b>로그인</b>, 알바는 <b>회원가입</b> 후 이용하세요.</p>
    <label>이메일</label><input id="email" type="email" placeholder="이메일">
    <label>비밀번호</label><input id="pw" type="password" placeholder="비밀번호 (6자 이상)" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">로그인</button>
    <button class="btn ghost" style="margin-top:8px" onclick="doSignup()">회원가입 (알바 신규)</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 3) 앱 -->
<div id="app" class="app hide">
  <div class="side" style="position:relative">
    <div class="logo">클린 오피스<small>영업 관리</small></div>
    <div class="nav" id="nav">
      <div class="grp">영업</div>
      <a data-v="dash" class="on"><i class="ti ti-layout-dashboard"></i>대시보드</a>
      <a data-v="sales"><i class="ti ti-target"></i>영업보드</a>
      <a data-v="map"><i class="ti ti-map-pin"></i>지도</a>
      <a data-v="route"><i class="ti ti-route"></i>동선</a>
      <div class="grp">고객·정산</div>
      <a data-v="clients"><i class="ti ti-file-check"></i>계약 호실</a>
      <a data-v="todo"><i class="ti ti-checklist"></i>할일</a>
    </div>
    <div class="logout" onclick="doLogout()">로그아웃 →</div>
  </div>
  <div class="main" id="view"><div class="loading">불러오는 중…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://nivgbvkjuvujofadpcsx.supabase.co";
const STATUSES = ["미접촉","전단지배포","관리실컨택","견적제출","계약","거절","보류"];
let sb=null, BUILDINGS=[], UNITAGG={};
const $=id=>document.getElementById(id);
const show=id=>{["setup","login","app"].forEach(x=>$(x).classList.toggle("hide",x!==id))};
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)}

function initClient(){
  const key=localStorage.getItem("co_anon")||"sb_publishable_0fg4AX0sTTh10IimI9VJfg_ybP6o7o9";
  if(!key){show("setup");return false}
  sb=supabase.createClient(SUPABASE_URL,key);
  return true;
}
async function boot(){
  if(!initClient())return;
  const {data}=await sb.auth.getSession();
  if(data && data.session){ showApp() } else { show("login") }
}
function saveKey(){
  const k=$("anonKey").value.trim();
  if(!(k.startsWith("sb_publishable_")||k.startsWith("eyJ"))){$("setupErr").textContent="키 형식 확인! 'sb_publishable_...' (또는 'eyJ...')로 시작하는 Publishable 키를 붙여넣어 주세요. Secret 키 아님!";return}
  if(k.startsWith("sb_secret_")){$("setupErr").textContent="그건 Secret 키예요! 위쪽 'Publishable key'를 복사해 주세요.";return}
  localStorage.setItem("co_anon",k);
  if(initClient()) show("login");
}
async function doLogin(){
  $("loginErr").textContent="";
  const email=$("email").value.trim(), password=$("pw").value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){$("loginErr").textContent="로그인 실패: "+error.message;return}
  showApp();
}
async function doSignup(){
  $("loginErr").style.color=""; $("loginErr").textContent="";
  const email=$("email").value.trim(), password=$("pw").value;
  if(!email || password.length<6){ $("loginErr").textContent="이메일과 6자 이상 비밀번호를 입력하세요."; return; }
  const {data,error}=await sb.auth.signUp({email,password});
  if(error){ $("loginErr").textContent="가입 실패: "+error.message; return; }
  if(data.session){ showApp(); }   // 메일확인 꺼져있으면 바로 입장
  else { $("loginErr").style.color="var(--green)"; $("loginErr").textContent="가입 완료! 인증 메일이 오면 확인 후, 다시 로그인하면 됩니다."; }
}
async function doLogout(){ await sb.auth.signOut(); show("login") }

let MYROLE='worker', MYEMAIL='';
async function loadRole(){
  const u=(await sb.auth.getUser()).data.user; MYEMAIL=(u&&u.email)||'';
  try{ const p=await sb.from('profiles').select('role').eq('id',u.id).maybeSingle(); MYROLE=(p.data&&p.data.role)||'worker'; }
  catch(e){ MYROLE='worker'; }
}
async function showApp(){
  show("app");
  await loadRole();
  if(MYROLE!=='owner'){ await showWorkerApp(); return; }   // 알바 = 일(동선) 관련만
  await loadData();
  document.querySelectorAll("#nav a").forEach(a=>a.onclick=()=>go(a.dataset.v));
  go("dash");
}
async function loadData(){
  const b=await sb.from("buildings").select("*").order("zone").order("road");
  BUILDINGS=b.data||[];
  const u=await sb.from("units").select("building_id,sales_status");
  UNITAGG={};
  (u.data||[]).forEach(x=>{const a=UNITAGG[x.building_id]=UNITAGG[x.building_id]||{n:0,c:0};a.n++;if(x.sales_status==="계약")a.c++});
}
const zonesList=()=>[...new Set(BUILDINGS.map(b=>b.zone))];

function go(view,arg){
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.v===view));
  const V=$("view");
  if(view==="dash")V.innerHTML=viewDash();
  else if(view==="sales"){V.innerHTML=viewSales();bindSales()}
  else if(view==="map")viewMap();
  else if(view==="route")viewRoute();
  else if(view==="detail")renderDetail(arg);
  else if(view==="clients")viewClients();
  else V.innerHTML='<h1>할일</h1><div class="sub">재방문(next_date) 알림 — 다음 단계에서 연결</div><div class="box">🚧 준비중</div>';
}
window.go=go;

function viewDash(){
  let totalUnits=0,contract=0;
  Object.values(UNITAGG).forEach(a=>{totalUnits+=a.n;contract+=a.c});
  const progress=Math.max(0,totalUnits-contract);
  const big=BUILDINGS.filter(b=>b.size_grade==="대형").length;
  const zones=zonesList();
  const zc=zones.map(z=>({z,n:BUILDINGS.filter(b=>b.zone===z).length})).sort((a,b)=>b.n-a.n);
  const total=BUILDINGS.length||1;
  const COL=["#c2410c","#ea9210","#15803d","#2563eb"];
  const top=zc.slice(0,4), etcN=zc.slice(4).reduce((s,x)=>s+x.n,0);
  const segs=top.map((x,i)=>({label:x.z,n:x.n,c:COL[i]}));
  if(etcN)segs.push({label:"기타",n:etcN,c:"#9ca3af"});
  const R=42, C=2*Math.PI*R; let off=0;
  const circ=segs.map(s=>{const len=C*s.n/total;const out=`<circle cx="60" cy="60" r="42" fill="none" stroke="${s.c}" stroke-width="15" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}"/>`;off+=len;return out}).join("");
  const dot=c=>`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};margin-right:6px"></span>`;
  const legend=segs.map(s=>`<div style="margin:3px 0">${dot(s.c)}${s.label} ${s.n}</div>`).join("");
  const topZone=zc[0]||{z:"-",n:0};
  const mx=zc[0]?zc[0].n:1;
  const bars=zc.slice(0,6).map(x=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span>${x.z}</span><span style="color:var(--mut)">${x.n}곳</span></div><div style="height:7px;background:var(--panel2);border-radius:5px;overflow:hidden"><i style="display:block;height:100%;background:var(--blue);width:${Math.round(x.n/mx*100)}%"></i></div></div>`).join("");
  return `<h1>대시보드</h1><div class="sub">서울 지식산업센터 ${total}곳 · 영업/계약은 호실 단위 · 클라우드 저장</div>
   <div style="background:#c2410c;border-radius:14px;padding:20px 22px;margin-bottom:18px;color:#fff">
     <div style="font-size:12px;opacity:.85;margin-bottom:6px">이번 동선 추천</div>
     <div style="font-size:21px;font-weight:800;line-height:1.3;margin-bottom:14px">${topZone.z} 권역 ${topZone.n}곳부터<br>집중 공략해 보세요</div>
     <button class="btn" style="background:#fff;color:#9a3412" onclick="go('sales')">영업보드 열기 →</button>
   </div>
   <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
     <span style="font-size:15px;font-weight:800;color:var(--txt)">주간 영업 현황</span>
     <div style="display:flex;gap:2px;background:var(--panel2);border-radius:8px;padding:2px">
       <span class="seg">일</span><span class="seg on">주</span><span class="seg">월</span><span class="seg">년</span>
     </div>
   </div>
   <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">
     <div class="kpi"><div class="kl">영업 대상 건물</div><div class="kv">${total}<span class="chip">대형 ${big}</span></div><div class="kx">서울 지식산업센터</div></div>
     <div class="kpi"><div class="kl">진행 중 호실</div><div class="kv">${progress}${progress?`<span class="chip">+${progress}</span>`:""}</div><div class="kx">견적·컨택 진행</div></div>
     <div class="kpi"><div class="kl">계약 호실</div><div class="kv g">${contract}${contract?`<span class="chip g">+${contract}</span>`:""}</div><div class="kx">정기청소 계약</div></div>
     <div class="kpi"><div class="kl">전단지 배포 건물</div><div class="kv g">${Object.keys(RVISIT).length}</div><div class="kx">동선에서 방문완료</div></div>
   </div>
   <div style="display:flex;gap:14px;flex-wrap:wrap">
     <div class="box" style="flex:1.4;min-width:280px">
       <h3>권역별 건물 수</h3><div class="sub" style="margin-bottom:14px">건물 많은 권역부터 공략</div>${bars}
     </div>
     <div class="box" style="flex:1;min-width:220px">
       <h3>권역 비중</h3>
       <div style="display:flex;align-items:center;gap:14px;margin-top:6px">
         <svg viewBox="0 0 120 120" style="width:120px;height:120px;flex-shrink:0"><g transform="rotate(-90 60 60)">${circ}</g><text x="60" y="58" text-anchor="middle" style="font-size:21px;font-weight:800" fill="var(--txt)">${total}</text><text x="60" y="74" text-anchor="middle" style="font-size:10px" fill="var(--mut)">건물</text></svg>
         <div style="font-size:12px;color:var(--txt)">${legend}</div>
       </div>
     </div>
   </div>`;
}
let SMODE="list";
function viewSales(){
  return `<h1>영업보드</h1><div class="sub">건물 ${BUILDINGS.length}곳 · 클릭하면 호실별 영업·견적·계약 관리</div>
   <div style="display:flex;gap:3px;background:var(--panel2);border-radius:9px;padding:3px;width:fit-content;margin-bottom:14px">
     <span class="smode" data-m="list">목록</span><span class="smode" data-m="route">권역별</span>
   </div>
   <div id="sbody"></div>`;
}
function bindSales(){
  document.querySelectorAll(".smode").forEach(b=>b.onclick=()=>{SMODE=b.dataset.m;renderSMode()});
  renderSMode();
}
function renderSMode(){
  document.querySelectorAll(".smode").forEach(b=>b.classList.toggle("on",b.dataset.m===SMODE));
  const body=$("sbody");
  if(SMODE==="list"){ body.innerHTML=salesListHtml(); bindList(); }
  else { body.innerHTML=zonesHtml(); }
}
function salesListHtml(){
  const zs=zonesList();
  return `<div class="tools">
    <select id="fz"><option value="">전체 권역</option>${zs.map(z=>`<option>${z}</option>`).join("")}</select>
    <select id="fg"><option value="">전체 규모</option><option>대형</option><option>중형</option><option>소형</option></select>
    <input id="fq" placeholder="건물명·주소 검색">
   </div>
   <div style="max-height:60vh;overflow:auto"><table><thead><tr><th>권역</th><th>도로</th><th>건물명</th><th>규모</th><th>총호실·층수</th><th>관리/계약</th><th></th></tr></thead><tbody id="tb"></tbody></table></div>`;
}
function bindList(){["fz","fg","fq"].forEach(id=>{$(id).oninput=renderSalesRows;$(id).onchange=renderSalesRows});renderSalesRows()}
function renderSalesRows(){
  const fz=$("fz").value,fg=$("fg").value,fq=($("fq").value||"").trim();
  const list=BUILDINGS.filter(b=>(!fz||b.zone===fz)&&(!fg||b.size_grade===fg)&&(!fq||(b.name||"").includes(fq)||(b.address||"").includes(fq))).sort((a,b)=>(+b.units||0)-(+a.units||0));
  $("tb").innerHTML=list.map(b=>{const a=UNITAGG[b.id]||{n:0,c:0};
    return `<tr><td>${b.zone}</td><td>${b.road||""}</td><td><b>${b.name}</b><div style="color:var(--mut);font-size:11px">${b.address||""}</div></td>
     <td><span class="tag ${b.size_grade}">${b.size_grade}</span></td>
     <td><b style="color:var(--blue2)">${b.units!=null?b.units+"호":"-"}</b><div style="color:var(--mut);font-size:11px">지상 ${b.floors||"-"}층</div></td>
     <td><span class="badge">관리 <b>${a.n}</b></span> <span class="badge g">계약 <b>${a.c}</b></span>${RVISIT[b.id]?` <span class="badge g">전단지✓</span>`:""}</td>
     <td><button class="btn sm" onclick="go('detail','${b.id}')">상세 →</button></td></tr>`}).join("");
}
function zonesHtml(){
  const zs=zonesList();

function bstat(b){ // 영업상태 분류 → 색
  const a=UNITAGG[b.id]||{n:0,c:0};
  if(a.c>0) return {k:"계약",  c:"#15803d"};
  if(a.n>0) return {k:"진행중", c:"#d97706"};
  return       {k:"미접촉", c:"#9ca3af"};
}
function cleanAddr(s){ return (s||"").split("(")[0].split(" 외")[0].split(",")[0].trim(); }
function coordOf(b){ if(b.lat&&b.lng)return [b.lat,b.lng]; if(COORDS[b.id])return COORDS[b.id]; return null; }
async function persistCoord(id,ll){ try{ await sb.from("buildings").update({lat:ll[0],lng:ll[1]}).eq("id",id); }catch(e){} }

function loadKakao(){
  return new Promise((res,rej)=>{
    if(window.kakao&&window.kakao.maps&&window.kakao.maps.services){res();return}
    const k=KAKAO_KEY(); if(!k){rej("nokey");return}
    const s=document.createElement("script");
    s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${k}&autoload=false&libraries=services`;
    s.onload=()=>kakao.maps.load(()=>res());
    s.onerror=()=>rej("loaderr");
    document.head.appendChild(s);
  });
}

function geocodeOne(geocoder,places,b){
  return new Promise(res=>{
    const addr=cleanAddr(b.address);
    const byName=()=>places.keywordSearch(b.name,(d,st)=>{
      res(st===kakao.maps.services.Status.OK&&d[0] ? [+d[0].y,+d[0].x] : null);
    });
    if(addr) geocoder.addressSearch(addr,(d,st)=>{
      if(st===kakao.maps.services.Status.OK&&d[0]) res([+d[0].y,+d[0].x]); else byName();
    });
    else byName();
  });
}
async function ensureCoords(){
  const miss=BUILDINGS.filter(b=>!coordOf(b));
  if(!miss.length)return;
  const geocoder=new kakao.maps.services.Geocoder();
  const places=new kakao.maps.services.Places();
  let done=0;
  for(const b of miss){
    const ll=await geocodeOne(geocoder,places,b);
    if(ll){ COORDS[b.id]=ll; persistCoord(b.id,ll); }
    done++;
    if($("mstat"))$("mstat").textContent=`좌표 변환 중… ${done}/${miss.length} · 다음부터는 즉시 표시됩니다`;
    await new Promise(r=>setTimeout(r,60));
  }
  localStorage.setItem("co_coords",JSON.stringify(COORDS));
  if($("mstat"))$("mstat").textContent=`건물 ${BUILDINGS.length}곳 · 핀 클릭 → 호실 영업관리`;
}
function unitSize(u){ u=+u||0; if(u>=700)return 38; if(u>=350)return 28; if(u>=150)return 20; if(u>=50)return 13; return 9; }

/* ===================== 동선 (원터치 영업 동선) ===================== */
const KMOB="eccf87b9aa3b6731a58f6ee47003ec3e";              // 카카오모빌리티 REST (차량 실도로)
const OSRM="https://routing.openstreetmap.de/routed-foot";   // OSM 보행자 라우팅 (무키)
let RROUTE=[], RDONE=new Set(), rmap=null, rov=[], rline=null, RMODE="차량";
let RVISIT=JSON.parse(localStorage.getItem("co_visited")||"{}"); // building.id -> 날짜(전단지 배포 기록)
function tfetch(url,opt,ms){ const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms||9000);
  return fetch(url,Object.assign({signal:c.signal},opt||{})).finally(()=>clearTimeout(t)); }

function rhav(a,b){const R=6371,dLa=(b.la-a.la)*Math.PI/180,dLn=(b.ln-a.ln)*Math.PI/180,
  x=Math.sin(dLa/2)**2+Math.cos(a.la*Math.PI/180)*Math.cos(b.la*Math.PI/180)*Math.sin(dLn/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));}
function rNN(stops,d){
  let start=0; stops.forEach((b,i)=>{if(b.u>stops[start].u)start=i});
  const used=new Set([start]), order=[start]; let cur=start;
  while(order.length<stops.length){ let best=-1,bd=Infinity;
    for(let j=0;j<stops.length;j++) if(!used.has(j)){const dd=d(cur,j); if(dd<bd){bd=dd;best=j;}}
    used.add(best); order.push(best); cur=best;
  } return order;
}
function rTwoOpt(order,d){ let improved=true,guard=0;
  while(improved && guard++<60){ improved=false;
    for(let i=1;i<order.length-1;i++) for(let k=i+1;k<order.length;k++){
      const a=order[i-1],b=order[i],c=order[k],e=order[k+1];
      const before=d(a,b)+(e!==undefined?d(c,e):0);
      const after=d(a,c)+(e!==undefined?d(b,e):0);
      if(after+1e-6<before){ const seg=order.slice(i,k+1).reverse(); order.splice(i,seg.length,...seg); improved=true; }
    }
  } return order;
}
async function rDriveMatrix(stops,onProg){
  const n=stops.length, M=Array.from({length:n},()=>Array(n).fill(0));
  const pairs=[]; for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)pairs.push([i,j]);
  let dn=0;
  async function one(p){ const [i,j]=p;
    try{ const url=`https://apis-navi.kakaomobility.com/v1/directions?origin=${stops[i].ln},${stops[i].la}&destination=${stops[j].ln},${stops[j].la}&priority=DISTANCE`;
      const r=await tfetch(url,{headers:{Authorization:"KakaoAK "+KMOB}},9000); const d=await r.json(); const rt=d.routes&&d.routes[0];
      const m=(rt&&rt.summary&&rt.summary.distance)|| rhav(stops[i],stops[j])*1000; M[i][j]=M[j][i]=m;
    }catch(e){ M[i][j]=M[j][i]=rhav(stops[i],stops[j])*1000; }
    dn++; if(onProg)onProg(dn,pairs.length);
  }
  for(let k=0;k<pairs.length;k+=5){ await Promise.all(pairs.slice(k,k+5).map(one)); }
  return M;
}
async function rWalkMatrix(stops){
  const coords=stops.map(b=>b.ln+","+b.la).join(";");
  const d=await tfetch(OSRM+"/table/v1/driving/"+coords+"?annotations=distance",{},9000).then(r=>r.json());
  if(d.code!=="Ok"||!d.distances) throw new Error("walk table fail");
  return d.distances;
}

async function genRoute(){
  const zone=$("rz").value, tgt=$("rt").value, mode=$("rmode").value, pri=$("rpri").value;
  const cnt=+$("rcnt").value, cap=+$("rcap").value; RMODE=mode;
  let pool=BUILDINGS.filter(b=>b.zone===zone && coordOf(b) && (+b.units>0));
  pool=pool.filter(b=>{const k=bstat(b).k; return tgt==="prog" ? k!=="계약" : k==="미접촉";});
  if(cap>0) pool=pool.filter(b=>(+b.units)<=cap);
  if(!pool.length){ toast("대상 건물이 없어요 (좌표·호실수·상태 확인)"); return; }
  const S=pool.map(b=>{const ll=coordOf(b);return {n:b.name, la:ll[0], ln:ll[1], u:+b.units||0, s:bstat(b).k, id:b.id};});
  const wHav=(i,j)=> rhav(S[i],S[j]) * (pri==="units"? 1/(1+S[j].u/2000):1);
  const order=rNN(S,wHav);
  let pick=[], usum=0;
  for(const idx of order){ if(pick.length>=cnt) break; if(cap>0 && usum+S[idx].u>cap) continue; pick.push(idx); usum+=S[idx].u; }
  if(!pick.length) pick=[order[0]];
  RROUTE=pick.map(i=>S[i]); RDONE.clear();
  showRouteResult();
  if(mode==="차량" && RROUTE.length>=3 && RROUTE.length<=12){
    setRMeta("실거리 최적화 중…");
    try{ const M=await rDriveMatrix(RROUTE,(k,t)=>setRMeta(`실거리 최적화 중… ${k}/${t}`)); const dM=(i,j)=>M[i][j];
      RROUTE=rTwoOpt(rNN(RROUTE,dM),dM).map(i=>RROUTE[i]); }
    catch(e){ const dH=(i,j)=>rhav(RROUTE[i],RROUTE[j]); RROUTE=rTwoOpt(rNN(RROUTE,dH),dH).map(i=>RROUTE[i]); }
  } else if(mode==="도보" && RROUTE.length>=3){
    setRMeta("보행 경로 최적화 중…");
    try{ const M=await rWalkMatrix(RROUTE); const dM=(i,j)=>M[i][j];
      RROUTE=rTwoOpt(rNN(RROUTE,dM),dM).map(i=>RROUTE[i]); }
    catch(e){ const dH=(i,j)=>rhav(RROUTE[i],RROUTE[j]); RROUTE=rTwoOpt(rNN(RROUTE,dH),dH).map(i=>RROUTE[i]); }
  } else {
    const dH=(i,j)=>rhav(RROUTE[i],RROUTE[j]); RROUTE=rTwoOpt(rNN(RROUTE,dH),dH).map(i=>RROUTE[i]);
  }
  renderRouteList(); applyRouteMap();
}
function showRouteResult(){
  const totU=RROUTE.reduce((s,b)=>s+b.u,0);
  $("rresult").innerHTML=`<div class="box" style="padding:0;overflow:hidden">
     <div style="background:#241c15;color:#fff;padding:13px 16px">
       <div style="font-size:12px;opacity:.8" id="rcap2">동선 · ${RROUTE.length}곳</div>
       <div style="font-size:13px;margin-top:3px" id="rmeta">경로 계산 중…</div>
       <div style="height:6px;background:rgba(255,255,255,.25);border-radius:99px;margin-top:9px;overflow:hidden"><i id="rprog" style="display:block;height:100%;background:#8fc79a;width:0;transition:width .3s"></i></div>
     </div>
     <div id="rmap" style="width:100%;height:300px"></div>
     <div id="rsum" style="padding:11px 16px;background:var(--panel2);font-size:12.5px;color:var(--mut);border-bottom:1px solid var(--line)">총 ${RROUTE.length}곳 · 호실 합계 ${totU.toLocaleString()}</div>
     <div id="rlist"></div>
   </div>
   <button class="btn" style="margin-top:10px" onclick="assignRoute()"><i class="ti ti-user-plus"></i> 이 동선을 알바에게 배정</button>
   <button class="btn ghost sm" onclick="go('route')">← 다시 만들기</button>`;
  rmap=null; rov=[]; rline=null;   // 매번 새 #rmap에 새 지도 (재생성 시 stale map 방지)
}
window.assignRoute=async()=>{
  if(!RROUTE.length){ toast("먼저 동선을 생성하세요"); return; }
  const email=prompt("배정할 알바 이메일을 입력하세요.\n알바가 이 이메일로 앱에 로그인하면 이 동선만 보입니다(영업 데이터는 안 보임).");
  if(!email) return;
  const stops=RROUTE.map(b=>({building_id:b.id,name:b.n,lat:b.la,lng:b.ln,units:b.u,status:b.s}));
  const owner=(await sb.auth.getUser()).data.user.id;
  const z=$("rz")?$("rz").value:"";
  const {error}=await sb.from("routes").insert({owner_id:owner,worker_email:email.trim().toLowerCase(),title:(z||"동선"),zone:z,mode:RMODE,stops,status:"active"});
  toast(error?("배정 실패: "+error.message):("✅ 배정됨 → "+email.trim()));
};
function rFirstUndone(){ for(let i=0;i<RROUTE.length;i++) if(!RDONE.has(i)) return i; return -1; }
function renderRouteList(){
  const cur=rFirstUndone();
  $("rlist").innerHTML=RROUTE.map((b,i)=>{
    const dn=RDONE.has(i); const flyer=RVISIT[b.id];
    const col=b.s==="계약"?"#15803d":b.s==="진행중"?"#d97706":"#9ca3af";
    return `<div style="display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--line);align-items:flex-start;${dn?'opacity:.5':''}${(!dn&&i===cur)?'box-shadow:inset 0 0 0 2px var(--blue)':''}">
      <div style="flex-shrink:0;width:25px;height:25px;border-radius:50%;background:${dn?'#15803d':'#c2410c'};color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px">${dn?'✓':(i+1)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13.5px;font-weight:600;${dn?'text-decoration:line-through;color:var(--mut)':''}">${b.n}</div>
        <div style="font-size:11.5px;color:var(--mut);margin:2px 0 6px"><span style="color:${col}">●</span> ${b.s} · ${b.u.toLocaleString()}호${flyer?' · <span style="color:#15803d">전단지 배포함</span>':''}</div>
        <div class="flex" style="gap:6px">
          <a class="btn sm" style="text-decoration:none" href="https://map.kakao.com/link/to/${encodeURIComponent(b.n)},${b.la},${b.ln}" target="_blank" rel="noopener">길찾기</a>
          <span class="btn sm ghost" onclick="rToggle(${i})">${dn?'취소':'방문완료'}</span>
        </div>
      </div></div>`;
  }).join("");
}
function updateRProg(){ const p=RROUTE.length?Math.round(RDONE.size/RROUTE.length*100):0; if($("rprog"))$("rprog").style.width=p+"%"; if($("rcap2"))$("rcap2").textContent=`동선 · ${RDONE.size}/${RROUTE.length} 완료`; }
window.rToggle=(i)=>{
  const b=RROUTE[i];
  if(RDONE.has(i)){ RDONE.delete(i); }
  else { RDONE.add(i); RVISIT[b.id]=new Date().toISOString().slice(0,10); localStorage.setItem("co_visited",JSON.stringify(RVISIT)); }
  renderRouteList(); updateRProg();
};
function rDrawMarkers(){
  rov.forEach(o=>o.setMap(null)); rov=[];
  const bounds=new kakao.maps.LatLngBounds();
  RROUTE.forEach((b,i)=>{
    const pos=new kakao.maps.LatLng(b.la,b.ln); bounds.extend(pos);
    const el=document.createElement("div");
    el.style.cssText="width:25px;height:25px;border-radius:50%;background:#c2410c;color:#fff;font:700 12px sans-serif;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)";
    el.textContent=(i+1);
    const ov=new kakao.maps.CustomOverlay({position:pos,content:el,xAnchor:.5,yAnchor:.5});
    ov.setMap(rmap); rov.push(ov);
  });
  if(RROUTE.length)rmap.setBounds(bounds);
}
function rDrawLine(pts,color,dash){ if(rline)rline.setMap(null);
  rline=new kakao.maps.Polyline({path:pts,strokeWeight:5,strokeColor:color,strokeOpacity:.85,strokeStyle:dash?"shortdash":"solid"});
  rline.setMap(rmap);
}
function rStraight(){
  let dist=0; for(let i=1;i<RROUTE.length;i++) dist+=rhav(RROUTE[i-1],RROUTE[i]);
  rDrawLine(RROUTE.map(b=>new kakao.maps.LatLng(b.la,b.ln)),"#9ca3af",true);
  const mins=Math.round(dist/0.067);
  setRMeta(`${RMODE==='도보'?'🚶 도보':'🚗 차량'}(직선 추정) ${dist.toFixed(1)}km · 약 ${mins}분`);
}
async function applyRouteMap(){
  try{ await loadKakao(); }catch(e){ setRMeta("지도 로드 실패 — 지도 탭에서 카카오 키를 먼저 설정하세요."); return; }
  if(!rmap){ rmap=new kakao.maps.Map($("rmap"),{center:new kakao.maps.LatLng(RROUTE[0].la,RROUTE[0].ln),level:5}); }
  rDrawMarkers();
  const totU=RROUTE.reduce((s,b)=>s+b.u,0);
  if(RMODE==="차량" && RROUTE.length>=2){
    try{
      const body={origin:{x:RROUTE[0].ln,y:RROUTE[0].la},destination:{x:RROUTE[RROUTE.length-1].ln,y:RROUTE[RROUTE.length-1].la},waypoints:RROUTE.slice(1,-1).map(b=>({x:b.ln,y:b.la})),priority:"RECOMMEND"};
      const r=await tfetch("https://apis-navi.kakaomobility.com/v1/waypoints/directions",{method:"POST",headers:{Authorization:"KakaoAK "+KMOB,"Content-Type":"application/json"},body:JSON.stringify(body)},12000);
      const d=await r.json(); const rt=d.routes&&d.routes[0];
      if(rt&&rt.result_code===0){
        const path=[]; rt.sections.forEach(s=>s.roads&&s.roads.forEach(rd=>{for(let i=0;i<rd.vertexes.length;i+=2)path.push(new kakao.maps.LatLng(rd.vertexes[i+1],rd.vertexes[i]));}));
        rDrawLine(path,"#c2410c",false);
        setRMeta(`🚗 차량 ${(rt.summary.distance/1000).toFixed(1)}km · ${Math.round(rt.summary.duration/60)}분 · 실도로`);
        if($("rsum"))$("rsum").innerHTML=`총 <b>${RROUTE.length}곳</b> · 호실 합계 <b>${totU.toLocaleString()}</b> · 실도로`;
        return;
      }
    }catch(e){}
  }
  if(RMODE==="도보" && RROUTE.length>=2){
    try{
      const coords=RROUTE.map(b=>b.ln+","+b.la).join(";");
      const d=await tfetch(OSRM+"/route/v1/driving/"+coords+"?overview=full&geometries=geojson",{},9000).then(r=>r.json());
      const rt=d.routes&&d.routes[0];
      if(d.code==="Ok"&&rt){
        const path=rt.geometry.coordinates.map(c=>new kakao.maps.LatLng(c[1],c[0]));
        rDrawLine(path,"#15803d",false);
        setRMeta(`🚶 도보 ${(rt.distance/1000).toFixed(1)}km · ${Math.round(rt.duration/60)}분 · 실보행`);
        if($("rsum"))$("rsum").innerHTML=`총 <b>${RROUTE.length}곳</b> · 호실 합계 <b>${totU.toLocaleString()}</b> · 실보행로`;
        return;
      }
    }catch(e){}
  }
  rStraight();
}

/* ===================== 알바 전용 화면 (일=동선만) ===================== */
let WROUTES=[], WCUR=null, WDONE=new Set(), wmap=null, wov=[];
async function showWorkerApp(){
  document.querySelector(".side").style.display="none";   // 영업 메뉴 숨김
  if(!localStorage.getItem("co_kakao")) localStorage.setItem("co_kakao","f18dc3635f475cc0dd93c44345779064"); // 지도 기본키(도메인 등록됨)
  const V=$("view"); V.innerHTML='<div class="loading">내 동선 불러오는 중…</div>';
  const {data,error}=await sb.from("routes").select("*").eq("status","active").order("created_at",{ascending:false});
  if(error){ V.innerHTML='<h1>내 동선</h1><div class="box">불러오기 오류: '+error.message+'</div>'; return; }
  WROUTES=data||[];
  V.innerHTML=`<h1>내 동선</h1><div class="sub">${MYEMAIL} · 배정된 동선 ${WROUTES.length}개 · <span class="link" onclick="doLogout()">로그아웃</span></div>`+
    (WROUTES.length? WROUTES.map((r,i)=>`<div class="box" style="cursor:pointer" onclick="openWRoute(${i})">
        <div style="font-weight:700;font-size:15px">${r.title||r.zone||'동선'} · ${(r.stops||[]).length}곳</div>
        <div class="sub" style="margin:4px 0 0">${r.zone||''} · ${r.mode||''} · ${new Date(r.created_at).toLocaleDateString()}</div>
      </div>`).join("") : '<div class="box">아직 배정된 동선이 없습니다. 사장님이 동선을 배정하면 여기 표시됩니다.</div>');
}
window.openWRoute=async(i)=>{
  WCUR=WROUTES[i]; const stops=WCUR.stops||[]; WDONE=new Set();
  const {data:vs}=await sb.from("visits").select("building_id").eq("route_id",WCUR.id);
  (vs||[]).forEach(v=>{const idx=stops.findIndex(s=>String(s.building_id)===String(v.building_id)); if(idx>=0)WDONE.add(idx);});
  renderWRoute();
};
function renderWRoute(){
  const stops=WCUR.stops||[];
  $("view").innerHTML=`<div class="flex" style="justify-content:space-between"><h1>${WCUR.title||WCUR.zone||'동선'}</h1><button class="btn ghost sm" onclick="showWorkerApp()">← 목록</button></div>
   <div class="sub">${stops.length}곳 · ${WCUR.mode||''} · 방문 <b id="wprog">${WDONE.size}/${stops.length}</b></div>
   <div id="wmap" style="width:100%;height:300px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px"></div>
   <div id="wlist"></div>`;
  wmap=null; wov=[];
  renderWList(); drawWMap();
}
function renderWList(){
  const stops=WCUR.stops||[];
  $("wlist").innerHTML=stops.map((s,i)=>{const dn=WDONE.has(i);
   return `<div class="box" style="display:flex;gap:11px;align-items:flex-start;${dn?'opacity:.55':''}">
     <div style="flex-shrink:0;width:26px;height:26px;border-radius:50%;background:${dn?'#15803d':'#c2410c'};color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center">${dn?'✓':(i+1)}</div>
     <div style="flex:1;min-width:0">
       <div style="font-weight:600;${dn?'text-decoration:line-through;color:var(--mut)':''}">${s.name}</div>
       <div class="sub" style="margin:2px 0 7px">${(+s.units||0).toLocaleString()}호</div>
       <div class="flex" style="gap:6px">
         <a class="btn sm" style="text-decoration:none" href="https://map.kakao.com/link/to/${encodeURIComponent(s.name)},${s.lat},${s.lng}" target="_blank" rel="noopener">길찾기</a>
         <span class="btn sm ghost" onclick="wVisit(${i})">${dn?'완료됨':'방문완료'}</span>
       </div>
     </div></div>`;}).join("");
}
window.wVisit=async(i)=>{
  if(WDONE.has(i)) return;
  const s=(WCUR.stops||[])[i];
  const {error}=await sb.from("visits").insert({route_id:WCUR.id, owner_id:WCUR.owner_id, building_id:String(s.building_id||""), name:s.name, done:true});
  if(error){ toast("저장 실패: "+error.message); return; }
  WDONE.add(i); toast("방문 기록됨"); renderWList();
  if($("wprog"))$("wprog").textContent=WDONE.size+"/"+(WCUR.stops||[]).length;
};
function drawWMap(){
  loadKakao().then(()=>{
    const stops=WCUR.stops||[]; if(!stops.length)return;
    wmap=new kakao.maps.Map($("wmap"),{center:new kakao.maps.LatLng(stops[0].lat,stops[0].lng),level:5});
    wov.forEach(o=>o.setMap(null)); wov=[];
    const bounds=new kakao.maps.LatLngBounds();
    stops.forEach((s,i)=>{const pos=new kakao.maps.LatLng(s.lat,s.lng); bounds.extend(pos);
      const el=document.createElement("div");
      el.style.cssText="width:25px;height:25px;border-radius:50%;background:#c2410c;color:#fff;font:700 12px sans-serif;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)";
      el.textContent=(i+1);
      const ov=new kakao.maps.CustomOverlay({position:pos,content:el,xAnchor:.5,yAnchor:.5}); ov.setMap(wmap); wov.push(ov);});
    if(stops.length)wmap.setBounds(bounds);
  }).catch(()=>{ if($("wmap"))$("wmap").innerHTML='<div class="loading">지도를 못 불러왔어요 — 각 항목의 길찾기 버튼을 쓰세요</div>'; });
}

boot();
</script></body></html>
