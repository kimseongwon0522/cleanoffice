<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>클린 오피스 — 영업 관리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
:root{
  --g50:#faf7f2;--g100:#f3ede3;--g200:#e7dccd;--g300:#d6c7b2;--g400:#b3a48d;
  --g500:#8c7e6c;--g600:#6b5f50;--g700:#4d4338;--g800:#2e2823;--g900:#1c1814;
  --bg:#faf7f2;--panel:#ffffff;--panel2:#f3ede3;--line:#e7dccd;--navy:#f3ede3;
  --blue:#bd5f37;--blue2:#974726;--txt:#2e2823;--mut:#8c7e6c;
  --green:#5f7a4a;--yellow:#c08a3a;--red:#c0492f;--ring:#bd5f37;
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  --shadow-sm:0 1px 2px rgba(60,45,30,.06);
  --shadow:0 4px 6px -1px rgba(60,45,30,.08),0 2px 4px -2px rgba(60,45,30,.05);
  --shadow-lg:0 12px 22px -6px rgba(60,45,30,.13),0 4px 8px -4px rgba(60,45,30,.07);
  --tq:.12s;--tr:.2s;--ease:cubic-bezier(.4,0,.2,1);
}
body{background:var(--bg);color:var(--g900);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;font-size:15px;line-height:1.6;letter-spacing:-.01em}
.hide{display:none!important}
input,select,button{font-family:inherit}
input,select{background:#fff;border:1px solid var(--g300);color:var(--g900);border-radius:var(--r-sm);padding:10px 12px;font-size:13.5px;transition:border-color var(--tq),box-shadow var(--tq)}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(189,95,55,.15)}
input::placeholder{color:var(--g400)}
*:focus-visible{outline:2px solid var(--ring);outline-offset:2px}
.btn{position:relative;display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--blue);color:#fff;border:1px solid transparent;border-radius:var(--r-sm);padding:0 16px;height:40px;font-size:13.5px;cursor:pointer;font-weight:700;letter-spacing:-.01em;box-shadow:var(--shadow-sm);transition:transform var(--tq) var(--ease),box-shadow var(--tr) var(--ease),background var(--tr) var(--ease)}
.btn:hover{background:var(--blue2);box-shadow:var(--shadow);transform:translateY(-1px)}
.btn:active{transform:scale(.975)}
.btn.sm{height:32px;padding:0 11px;font-size:12px}
.btn.ghost{background:transparent;border-color:var(--g200);color:var(--g600);box-shadow:none;font-weight:600}
.btn.ghost:hover{background:var(--panel2);color:var(--g800);transform:none}
.btn.secondary{background:var(--panel2);color:var(--g800);box-shadow:none}
.btn.secondary:hover{background:var(--g200)}
.btn[disabled],.btn[aria-disabled=true]{opacity:.5;pointer-events:none}
/* center cards (setup/login) */
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(120% 80% at 50% 0%,#fbf6ee,var(--bg))}
.cardbox{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-lg);padding:34px 30px;width:390px;box-shadow:var(--shadow-lg)}
.cardbox h2{color:var(--blue2);font-size:23px;font-weight:800;margin-bottom:6px;letter-spacing:-.4px}
.cardbox p{color:var(--mut);font-size:13px;margin-bottom:18px;line-height:1.65}
.cardbox label{display:block;font-size:12px;color:var(--g600);font-weight:600;margin:12px 0 5px}
.cardbox input{width:100%}
.cardbox .btn{width:100%;margin-top:18px;height:46px}
.err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:16px}
/* app shell */
.app{display:flex;min-height:100vh}
.side{width:222px;background:#241c15;flex-shrink:0;padding:22px 0;position:relative;display:flex;flex-direction:column}
.logo{font-size:18px;font-weight:800;color:#fff;padding:0 22px 4px;letter-spacing:-.4px}
.logo small{display:block;font-size:11px;color:#a99a82;font-weight:500;margin-top:3px;letter-spacing:0}
.nav{margin-top:20px;padding:0 12px}
.nav a{display:flex;align-items:center;gap:11px;padding:10px 13px;color:#c7b9a3;font-size:13.5px;font-weight:500;border-radius:var(--r-sm);cursor:pointer;margin-bottom:2px;transition:background var(--tq),color var(--tq)}
.nav a i{font-size:19px;color:#94856e;transition:color var(--tq)}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a:hover i{color:#e8c4a3}
.nav a.on{background:var(--blue);color:#fff;font-weight:700;box-shadow:0 4px 12px -2px rgba(189,95,55,.5)}
.nav a.on i{color:#fff}
.nav .grp{font-size:10px;font-weight:700;letter-spacing:.08em;color:#7e7059;padding:18px 13px 6px;text-transform:uppercase}
.seg{font-size:12px;padding:6px 13px;border-radius:7px;color:var(--mut);cursor:pointer;transition:var(--tq);font-weight:600}
.seg.on{background:var(--panel);color:var(--g800);box-shadow:var(--shadow-sm)}
.smode{display:inline-block;font-size:13px;padding:7px 18px;border-radius:7px;color:var(--mut);cursor:pointer;transition:var(--tq);font-weight:600}
.smode.on{background:var(--blue);color:#fff}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:17px 19px;box-shadow:var(--shadow-sm);transition:box-shadow var(--tr),transform var(--tr)}
.kpi:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kl{font-size:12px;color:var(--mut);margin-bottom:8px;font-weight:500}
.kv{font-size:26px;font-weight:800;display:flex;align-items:baseline;gap:8px;letter-spacing:-.6px;color:var(--g900)}.kv.g{color:var(--green)}.kx{font-size:11px;color:var(--mut);margin-top:6px}
.chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;background:#f3e3d3;color:#9a3412}.chip.g{background:#e4efdb;color:#4d6638}
.logout{margin-top:auto;padding:14px 22px 0;font-size:12.5px;color:var(--mut);cursor:pointer;font-weight:600;transition:color var(--tq)}
.logout:hover{color:var(--blue2)}
.main{flex:1;padding:30px 36px;overflow:auto;max-height:100vh}
h1{font-size:23px;font-weight:800;margin-bottom:3px;letter-spacing:-.5px;color:var(--g900)}.sub{color:var(--mut);font-size:13px;margin-bottom:22px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:22px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:17px 19px;box-shadow:var(--shadow-sm)}
.card.hero{background:var(--blue);border-color:var(--blue)}
.card .k{font-size:12px;color:var(--mut)}.card .v{font-size:25px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
.v.b{color:var(--blue2)}.v.g{color:var(--green)}.v.y{color:var(--yellow)}
.tools{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px}
table{width:100%;border-collapse:separate;border-spacing:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden;box-shadow:var(--shadow-sm)}
th,td{padding:11px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
th{background:var(--panel2);color:var(--g500);font-size:11px;font-weight:700;letter-spacing:.02em;position:sticky;top:0;z-index:1}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--g50)}
.tag{font-size:11px;padding:3px 9px;border-radius:7px;font-weight:700}
.대형{background:#f6e0cf;color:#b8541f}.중형{background:#f6ead0;color:#8a6418}.소형{background:#eee6d8;color:#78716c}.미상{background:#eceae6;color:#999}
.st{font-size:12px;border-radius:8px;padding:7px 9px;border:1px solid var(--g300);background:#fff;color:var(--g900)}
.badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--panel2);border:1px solid var(--line);color:var(--mut);font-weight:600}
.badge b{color:var(--blue2)}.badge.g b{color:var(--green)}
.box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:19px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.box h3{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--g800)}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.del{color:var(--red);cursor:pointer}.link{color:var(--blue2);cursor:pointer;font-weight:600}.link:hover{text-decoration:underline}
.toast{position:fixed;bottom:22px;right:22px;background:var(--g900);color:#fff;padding:12px 18px;border-radius:var(--r-md);font-size:13px;font-weight:600;opacity:0;transform:translateY(10px);transition:.25s var(--ease);pointer-events:none;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateY(0)}
.loading{color:var(--mut);padding:48px;text-align:center}
.skeleton{background:linear-gradient(90deg,var(--g100) 25%,var(--g200) 37%,var(--g100) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:var(--r-sm)}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
@media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important}.btn:hover,.kpi:hover{transform:none}}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--g400)}
@media(max-width:820px){
  .app{flex-direction:column;min-height:auto}
  .side{width:100%;border-right:none;border-bottom:1px solid #e2d6c2;padding:12px 0;flex-direction:row;align-items:center;gap:6px;overflow-x:auto}
  .logo{padding:0 6px 0 16px;white-space:nowrap}
  .logo small{display:none}
  .nav{display:flex;margin-top:0;padding:0 8px;gap:4px}
  .nav .grp{display:none}
  .nav a{margin-bottom:0;white-space:nowrap;padding:9px 12px}
  .logout{margin:0 14px 0 auto;padding:0;white-space:nowrap}
  .main{padding:18px 16px;max-height:none}
  h1{font-size:20px}
}
</style></head>
<body>

<!-- 1) Supabase 키 설정 -->
<div id="setup" class="center hide">
  <div class="cardbox">
    <h2>클린 오피스</h2>
    <p>처음 한 번만 연결합니다.<br>Supabase <b>Project Settings → API Keys</b> 에서 <b>"Publishable key"</b>(sb_publishable_…)를 복사해 붙여넣으세요. ※ Secret key는 쓰면 안 돼요. (Project URL은 이미 넣어뒀어요)</p>
    <label>Publishable key</label>
    <input id="anonKey" placeholder="sb_publishable_... (또는 eyJ...)">
    <button class="btn" onclick="saveKey()">연결</button>
    <div class="err" id="setupErr"></div>
  </div>
</div>

<!-- 2) 로그인 -->
<div id="login" class="center hide">
  <div class="cardbox">
    <h2>클린 오피스</h2>
    <p>청소사업 영업 관리 · 로그인</p>
    <label>이메일</label><input id="email" type="email" placeholder="가입한 이메일">
    <label>비밀번호</label><input id="pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">로그인</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- 3) 앱 -->
<div id="app" class="app hide">
  <div class="side">
    <div class="logo">클린 오피스<small>영업 관리</small></div>
    <div class="nav" id="nav">
      <div class="grp">영업</div>
      <a data-v="dash" class="on"><i class="ti ti-layout-dashboard"></i>대시보드</a>
      <a data-v="sales"><i class="ti ti-target"></i>영업보드</a>
      <a data-v="map"><i class="ti ti-map-pin"></i>지도</a>
      <div class="grp">고객·정산</div>
      <a data-v="clients"><i class="ti ti-file-check"></i>계약 호실</a>
      <a data-v="todo"><i class="ti ti-checklist"></i>할일</a>
    </div>
    <div class="logout" onclick="doLogout()">로그아웃 →</div>
  </div>
  <div class="main" id="view"><div class="loading">불러오는 중…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = "https://nivgbvkjuvujofadpcsx.supabase.co";
const STATUSES = ["미접촉","전단지배포","관리실컨택","견적제출","계약","거절","보류"];
let sb=null, BUILDINGS=[], UNITAGG={};
const $=id=>document.getElementById(id);
const show=id=>{["setup","login","app"].forEach(x=>$(x).classList.toggle("hide",x!==id))};
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600)}

function initClient(){
  const key=localStorage.getItem("co_anon");
  if(!key){show("setup");return false}
  sb=supabase.createClient(SUPABASE_URL,key);
  return true;
}
async function boot(){
  if(!initClient())return;
  const {data}=await sb.auth.getSession();
  if(data && data.session){ showApp() } else { show("login") }
}
function saveKey(){
  const k=$("anonKey").value.trim();
  if(!(k.startsWith("sb_publishable_")||k.startsWith("eyJ"))){$("setupErr").textContent="키 형식 확인! 'sb_publishable_...' (또는 'eyJ...')로 시작하는 Publishable 키를 붙여넣어 주세요. Secret 키 아님!";return}
  if(k.startsWith("sb_secret_")){$("setupErr").textContent="그건 Secret 키예요! 위쪽 'Publishable key'를 복사해 주세요.";return}
  localStorage.setItem("co_anon",k);
  if(initClient()) show("login");
}
async function doLogin(){
  $("loginErr").textContent="";
  const email=$("email").value.trim(), password=$("pw").value;
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){$("loginErr").textContent="로그인 실패: "+error.message;return}
  showApp();
}
async function doLogout(){ await sb.auth.signOut(); show("login") }

async function showApp(){
  show("app");
  await loadData();
  document.querySelectorAll("#nav a").forEach(a=>a.onclick=()=>go(a.dataset.v));
  go("dash");
}
async function loadData(){
  const b=await sb.from("buildings").select("*").order("zone").order("road");
  BUILDINGS=b.data||[];
  const u=await sb.from("units").select("building_id,sales_status");
  UNITAGG={};
  (u.data||[]).forEach(x=>{const a=UNITAGG[x.building_id]=UNITAGG[x.building_id]||{n:0,c:0};a.n++;if(x.sales_status==="계약")a.c++});
}
const zonesList=()=>[...new Set(BUILDINGS.map(b=>b.zone))];

function go(view,arg){
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("on",a.dataset.v===view));
  const V=$("view");
  if(view==="dash")V.innerHTML=viewDash();
  else if(view==="sales"){V.innerHTML=viewSales();bindSales()}
  else if(view==="map")viewMap();
  else if(view==="detail")renderDetail(arg);
  else if(view==="clients")viewClients();
  else V.innerHTML='<h1>할일</h1><div class="sub">재방문(next_date) 알림 — 다음 단계에서 연결</div><div class="box">🚧 준비중</div>';
}
window.go=go;

function viewDash(){
  let totalUnits=0,contract=0;
  Object.values(UNITAGG).forEach(a=>{totalUnits+=a.n;contract+=a.c});
  const progress=Math.max(0,totalUnits-contract);
  const big=BUILDINGS.filter(b=>b.size_grade==="대형").length;
  const zones=zonesList();
  const zc=zones.map(z=>({z,n:BUILDINGS.filter(b=>b.zone===z).length})).sort((a,b)=>b.n-a.n);
  const total=BUILDINGS.length||1;
  const COL=["#bd5f37","#c79a52","#5f7a4a","#7c6f9e"];
  const top=zc.slice(0,4), etcN=zc.slice(4).reduce((s,x)=>s+x.n,0);
  const segs=top.map((x,i)=>({label:x.z,n:x.n,c:COL[i]}));
  if(etcN)segs.push({label:"기타",n:etcN,c:"#9ca3af"});
  const R=42, C=2*Math.PI*R; let off=0;
  const circ=segs.map(s=>{const len=C*s.n/total;const out=`<circle cx="60" cy="60" r="42" fill="none" stroke="${s.c}" stroke-width="15" stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}"/>`;off+=len;return out}).join("");
  const dot=c=>`<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${c};margin-right:6px"></span>`;
  const legend=segs.map(s=>`<div style="margin:3px 0">${dot(s.c)}${s.label} ${s.n}</div>`).join("");
  const topZone=zc[0]||{z:"-",n:0};
  const mx=zc[0]?zc[0].n:1;
  const bars=zc.slice(0,6).map(x=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span>${x.z}</span><span style="color:var(--mut)">${x.n}곳</span></div><div style="height:7px;background:var(--panel2);border-radius:5px;overflow:hidden"><i style="display:block;height:100%;background:var(--blue);width:${Math.round(x.n/mx*100)}%"></i></div></div>`).join("");
  return `<h1>대시보드</h1><div class="sub">서울 지식산업센터 ${total}곳 · 영업/계약은 호실 단위 · 클라우드 저장</div>
   <div style="background:linear-gradient(135deg,#bd5f37,#974726);border-radius:18px;padding:22px 24px;margin-bottom:18px;color:#fff;box-shadow:0 8px 22px rgba(151,71,38,.22)">
     <div style="font-size:12px;opacity:.85;margin-bottom:6px">이번 동선 추천</div>
     <div style="font-size:21px;font-weight:800;line-height:1.3;margin-bottom:14px">${topZone.z} 권역 ${topZone.n}곳부터<br>집중 공략해 보세요</div>
     <button class="btn" style="background:#fff;color:#974726" onclick="go('sales')">영업보드 열기 →</button>
   </div>
   <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
     <span style="font-size:15px;font-weight:800;color:var(--txt)">주간 영업 현황</span>
     <div style="display:flex;gap:2px;background:var(--panel2);border-radius:8px;padding:2px">
       <span class="seg">일</span><span class="seg on">주</span><span class="seg">월</span><span class="seg">년</span>
     </div>
   </div>
   <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">
     <div class="kpi"><div class="kl">영업 대상 건물</div><div class="kv">${total}<span class="chip">대형 ${big}</span></div><div class="kx">서울 지식산업센터</div></div>
     <div class="kpi"><div class="kl">진행 중 호실</div><div class="kv">${progress}${progress?`<span class="chip">+${progress}</span>`:""}</div><div class="kx">견적·컨택 진행</div></div>
     <div class="kpi"><div class="kl">계약 호실</div><div class="kv g">${contract}${contract?`<span class="chip g">+${contract}</span>`:""}</div><div class="kx">정기청소 계약</div></div>
   </div>
   <div style="display:flex;gap:14px;flex-wrap:wrap">
     <div class="box" style="flex:1.4;min-width:280px">
       <h3>권역별 건물 수</h3><div class="sub" style="margin-bottom:14px">건물 많은 권역부터 공략</div>${bars}
     </div>
     <div class="box" style="flex:1;min-width:220px">
       <h3>권역 비중</h3>
       <div style="display:flex;align-items:center;gap:14px;margin-top:6px">
         <svg viewBox="0 0 120 120" style="width:120px;height:120px;flex-shrink:0"><g transform="rotate(-90 60 60)">${circ}</g><text x="60" y="58" text-anchor="middle" style="font-size:21px;font-weight:800" fill="var(--txt)">${total}</text><text x="60" y="74" text-anchor="middle" style="font-size:10px" fill="var(--mut)">건물</text></svg>
         <div style="font-size:12px;color:var(--txt)">${legend}</div>
       </div>
     </div>
   </div>`;
}
let SMODE="list";
function viewSales(){
  return `<h1>영업보드</h1><div class="sub">건물 ${BUILDINGS.length}곳 · 클릭하면 호실별 영업·견적·계약 관리</div>
   <div style="display:flex;gap:3px;background:var(--panel2);border-radius:9px;padding:3px;width:fit-content;margin-bottom:14px">
     <span class="smode" data-m="list">목록</span><span class="smode" data-m="route">동선</span>
   </div>
   <div id="sbody"></div>`;
}
function bindSales(){
  document.querySelectorAll(".smode").forEach(b=>b.onclick=()=>{SMODE=b.dataset.m;renderSMode()});
  renderSMode();
}
function renderSMode(){
  document.querySelectorAll(".smode").forEach(b=>b.classList.toggle("on",b.dataset.m===SMODE));
  const body=$("sbody");
  if(SMODE==="list"){ body.innerHTML=salesListHtml(); bindList(); }
  else { body.innerHTML=zonesHtml(); }
}
function salesListHtml(){
  const zs=zonesList();
  return `<div class="tools">
    <select id="fz"><option value="">전체 권역</option>${zs.map(z=>`<option>${z}</option>`).join("")}</select>
    <select id="fg"><option value="">전체 규모</option><option>대형</option><option>중형</option><option>소형</option></select>
    <input id="fq" placeholder="건물명·주소 검색">
   </div>
   <div style="max-height:60vh;overflow:auto"><table><thead><tr><th>권역</th><th>도로</th><th>건물명</th><th>규모</th><th>총호실·층수</th><th>관리/계약</th><th></th></tr></thead><tbody id="tb"></tbody></table></div>`;
}
function bindList(){["fz","fg","fq"].forEach(id=>{$(id).oninput=renderSalesRows;$(id).onchange=renderSalesRows});renderSalesRows()}
function renderSalesRows(){
  const fz=$("fz").value,fg=$("fg").value,fq=($("fq").value||"").trim();
  const list=BUILDINGS.filter(b=>(!fz||b.zone===fz)&&(!fg||b.size_grade===fg)&&(!fq||(b.name||"").includes(fq)||(b.address||"").includes(fq))).sort((a,b)=>(+b.units||0)-(+a.units||0));
  $("tb").innerHTML=list.map(b=>{const a=UNITAGG[b.id]||{n:0,c:0};
    return `<tr><td>${b.zone}</td><td>${b.road||""}</td><td><b>${b.name}</b><div style="color:var(--mut);font-size:11px">${b.address||""}</div></td>
     <td><span class="tag ${b.size_grade}">${b.size_grade}</span></td>
     <td><b style="color:var(--blue2)">${b.units!=null?b.units+"호":"-"}</b><div style="color:var(--mut);font-size:11px">지상 ${b.floors||"-"}층</div></td>
     <td><span class="badge">관리 <b>${a.n}</b></span> <span class="badge g">계약 <b>${a.c}</b></span></td>
     <td><button class="btn sm" onclick="go('detail','${b.id}')">상세 →</button></td></tr>`}).join("");
}
function zonesHtml(){
  const zs=zonesList();
  let h='<div class="sub" style="margin-top:-4px;margin-bottom:12px">권역 → 도로별. 한 번에 한 도로씩 공략.</div>';
  zs.forEach(z=>{const items=BUILDINGS.filter(b=>b.zone===z);
    const roads=[...new Set(items.map(b=>b.road))];
    let rs=roads.map(rd=>{const bs=items.filter(b=>b.road===rd);
      return `<div style="background:var(--panel2);padding:7px 14px;color:var(--blue2);font-weight:700;font-size:13px">▶ ${rd||"기타"} (${bs.length})</div>`+
        bs.map(b=>{const a=UNITAGG[b.id]||{n:0,c:0};return `<div style="padding:6px 14px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:13px"><span class="link" onclick="go('detail','${b.id}')">${b.name}</span><span style="color:var(--mut)"><span class="tag ${b.size_grade}">${b.size_grade}</span> <b style="color:var(--blue2)">${b.units!=null?b.units+"호":"-"}</b>·관리${a.n}</span></div>`}).join("")}).join("");
    h+=`<details class="box" style="padding:0"><summary style="padding:12px 16px;cursor:pointer;font-weight:700">${z} (${items.length}곳)</summary>${rs}</details>`});
  return h;
}
async function renderDetail(bid){
  const b=BUILDINGS.find(x=>x.id==bid);
  $("view").innerHTML=`<div class="loading">호실 불러오는 중…</div>`;
  const {data:units}=await sb.from("units").select("*").eq("building_id",bid).order("created_at");
  const {data:cts}=await sb.from("building_contacts").select("*").eq("building_id",bid).limit(1);
  const c=(cts&&cts[0])||{};
  const urows=(units||[]).map(u=>`<tr data-uid="${u.id}">
     <td><input value="${u.ho||""}" data-f="ho" style="width:90px"></td>
     <td><input value="${u.tenant||""}" data-f="tenant" placeholder="입주사" style="width:130px"></td>
     <td><select class="st" data-f="sales_status">${STATUSES.map(s=>`<option ${s===u.sales_status?"selected":""}>${s}</option>`).join("")}</select></td>
     <td><input value="${u.memo||""}" data-f="memo" placeholder="담당자·연락처·재방문" style="width:220px"></td>
     <td><span class="del" data-del="${u.id}">✕</span></td></tr>`).join("");
  $("view").innerHTML=`<div class="flex" style="justify-content:space-between"><h1>${b.name}</h1><button class="btn ghost sm" onclick="go('sales')">← 목록</button></div>
   <div class="sub">${b.zone} · ${b.road||""} · <span class="tag ${b.size_grade}">${b.size_grade}</span> · ${b.gross_area? b.gross_area.toLocaleString()+"㎡":""} · ${b.gu} ${b.address||""}</div>
   <div class="box"><h3>관리실 연락처 (건물)</h3><div class="flex">
     <input id="cm" value="${c.name||""}" placeholder="관리소장/총무">
     <input id="cp" value="${c.phone||""}" placeholder="연락처">
     <input id="cmemo" value="${c.memo||""}" placeholder="메모" style="min-width:240px">
     <button class="btn sm" onclick="saveContact('${bid}','${c.id||""}')">저장</button></div></div>
   <div class="box"><div class="flex" style="justify-content:space-between"><h3>호실별 영업 (${(units||[]).length}호실)</h3>
     <button class="btn sm" onclick="addUnit('${bid}')">+ 호실 추가</button></div>
     <table><thead><tr><th>호수</th><th>입주사</th><th>영업상태</th><th>메모</th><th></th></tr></thead>
     <tbody id="ut">${urows||'<tr><td colspan=5 style="color:var(--mut)">호실 없음. "호실 추가"로 시작.</td></tr>'}</tbody></table></div>`;
  bindDetail(bid);
}
function bindDetail(bid){
  document.querySelectorAll("#ut tr[data-uid]").forEach(tr=>{
    const uid=tr.dataset.uid;
    tr.querySelectorAll("[data-f]").forEach(el=>{
      const h=async()=>{const patch={};patch[el.dataset.f]=el.value;const {error}=await sb.from("units").update(patch).eq("id",uid);if(!error)toast("저장됨");if(el.dataset.f==="sales_status"){await loadData()}};
      el.tagName==="SELECT"?el.onchange=h:el.onchange=h;
    });
    tr.querySelector("[data-del]").onclick=async()=>{await sb.from("units").delete().eq("id",uid);await loadData();renderDetail(bid)};
  });
}
window.addUnit=async(bid)=>{await sb.from("units").insert({building_id:bid,sales_status:"미접촉"});await loadData();renderDetail(bid)};
window.saveContact=async(bid,cid)=>{const row={building_id:bid,name:$("cm").value,phone:$("cp").value,memo:$("cmemo").value};
  if(cid){await sb.from("building_contacts").update(row).eq("id",cid)}else{await sb.from("building_contacts").insert(row)}
  toast("관리실 연락처 저장됨");renderDetail(bid)};
async function viewClients(){
  $("view").innerHTML='<h1>계약 호실</h1><div class="sub">상태가 \'계약\'인 호실</div><div class="loading">불러오는 중…</div>';
  const {data}=await sb.from("units").select("ho,tenant,building_id").eq("sales_status","계약");
  const bmap={};BUILDINGS.forEach(b=>bmap[b.id]=b);
  const rows=(data||[]).map(u=>{const b=bmap[u.building_id]||{};return `<tr><td><b>${u.tenant||u.ho||"-"}</b></td><td>${b.name||""}</td><td>${b.zone||""}</td><td>${u.ho||""}</td></tr>`}).join("");
  $("view").innerHTML=`<h1>계약 호실 (${(data||[]).length})</h1><div class="sub">영업보드에서 상태를 '계약'으로 바꾸면 여기 모입니다</div>
   ${(data||[]).length?`<table><thead><tr><th>입주사</th><th>건물</th><th>권역</th><th>호수</th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="box">아직 계약 호실이 없습니다.</div>'}`;
}
/* ===================== 지도 (카카오맵) ===================== */
const KAKAO_KEY=()=>localStorage.getItem("co_kakao")||"";
let COORDS=JSON.parse(localStorage.getItem("co_coords")||"{}");  // building.id -> [lat,lng]
let kmap=null, kInfo=null, kOverlays=[];

function bstat(b){ // 영업상태 분류 → 색
  const a=UNITAGG[b.id]||{n:0,c:0};
  if(a.c>0) return {k:"계약",  c:"#5f7a4a"};
  if(a.n>0) return {k:"진행중", c:"#bd5f37"};
  return       {k:"미접촉", c:"#9ca3af"};
}
function cleanAddr(s){ return (s||"").split("(")[0].split(" 외")[0].split(",")[0].trim(); }
function coordOf(b){ if(b.lat&&b.lng)return [b.lat,b.lng]; if(COORDS[b.id])return COORDS[b.id]; return null; }
async function persistCoord(id,ll){ try{ await sb.from("buildings").update({lat:ll[0],lng:ll[1]}).eq("id",id); }catch(e){} }

function loadKakao(){
  return new Promise((res,rej)=>{
    if(window.kakao&&window.kakao.maps&&window.kakao.maps.services){res();return}
    const k=KAKAO_KEY(); if(!k){rej("nokey");return}
    const s=document.createElement("script");
    s.src=`https://dapi.kakao.com/v2/maps/sdk.js?appkey=${k}&autoload=false&libraries=services`;
    s.onload=()=>kakao.maps.load(()=>res());
    s.onerror=()=>rej("loaderr");
    document.head.appendChild(s);
  });
}
function kakaoSetupHtml(){
  return `<h1>지도 — 카카오 키 설정</h1><div class="sub">한 번만 설정하면 됩니다 (무료)</div>
   <div class="box" style="max-width:580px">
    <p style="color:var(--mut);line-height:1.8;font-size:12.5px">
    1) <b>developers.kakao.com</b> 로그인 → <b>내 애플리케이션 → 애플리케이션 추가하기</b><br>
    2) 만든 앱 → <b>앱 키</b>에서 <b>JavaScript 키</b> 복사<br>
    3) 같은 앱 → <b>플랫폼 → Web 플랫폼 등록</b>에 이 앱의 주소 등록<br>
    &nbsp;&nbsp;&nbsp;(로컬 테스트는 <b>http://localhost:8000</b>, 배포 후엔 그 도메인)<br>
    4) 아래에 JavaScript 키 붙여넣기</p>
    <label style="font-size:12px;color:var(--mut)">JavaScript 키</label>
    <input id="kkey" placeholder="카카오 JavaScript 키" style="width:100%;margin:6px 0">
    <button class="btn" onclick="saveKakao()">저장하고 지도 열기</button>
    <div class="err" id="kerr"></div>
   </div>`;
}
window.saveKakao=()=>{const k=$("kkey").value.trim(); if(!k){$("kerr").textContent="키를 넣어주세요";return} localStorage.setItem("co_kakao",k); go("map");};

function geocodeOne(geocoder,places,b){
  return new Promise(res=>{
    const addr=cleanAddr(b.address);
    const byName=()=>places.keywordSearch(b.name,(d,st)=>{
      res(st===kakao.maps.services.Status.OK&&d[0] ? [+d[0].y,+d[0].x] : null);
    });
    if(addr) geocoder.addressSearch(addr,(d,st)=>{
      if(st===kakao.maps.services.Status.OK&&d[0]) res([+d[0].y,+d[0].x]); else byName();
    });
    else byName();
  });
}
async function ensureCoords(){
  const miss=BUILDINGS.filter(b=>!coordOf(b));
  if(!miss.length)return;
  const geocoder=new kakao.maps.services.Geocoder();
  const places=new kakao.maps.services.Places();
  let done=0;
  for(const b of miss){
    const ll=await geocodeOne(geocoder,places,b);
    if(ll){ COORDS[b.id]=ll; persistCoord(b.id,ll); }
    done++;
    if($("mstat"))$("mstat").textContent=`좌표 변환 중… ${done}/${miss.length} · 다음부터는 즉시 표시됩니다`;
    await new Promise(r=>setTimeout(r,60));
  }
  localStorage.setItem("co_coords",JSON.stringify(COORDS));
  if($("mstat"))$("mstat").textContent=`건물 ${BUILDINGS.length}곳 · 핀 클릭 → 호실 영업관리`;
}
function unitSize(u){ u=+u||0; if(u>=700)return 38; if(u>=350)return 28; if(u>=150)return 20; if(u>=50)return 13; return 9; }
function drawPins(){
  kOverlays.forEach(o=>o.setMap(null)); kOverlays=[];
  const fz=$("mz")?$("mz").value:"";
  const fu=$("mu")?+$("mu").value:0;
  const bounds=new kakao.maps.LatLngBounds(); let shown=0;
  BUILDINGS.filter(b=>(!fz||b.zone===fz)&&((+b.units||0)>=fu)).forEach(b=>{
    const ll=coordOf(b); if(!ll)return;
    const pos=new kakao.maps.LatLng(ll[0],ll[1]); const st=bstat(b);
    const el=document.createElement("div");
    const sz=unitSize(b.units);
    el.style.cssText=`width:${sz}px;height:${sz}px;border-radius:50%;background:${st.c};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4);cursor:pointer`;
    el.title=b.name;
    el.onclick=()=>{ const a=UNITAGG[b.id]||{n:0,c:0};
      if(kInfo)kInfo.close();
      kInfo=new kakao.maps.InfoWindow({removable:true,position:pos,content:
        `<div style="padding:9px 11px;font-size:12.5px;min-width:160px;line-height:1.6">
          <b>${b.name}</b><br><span style="color:#999">${b.zone} · ${b.size_grade||""}</span><br>
          <span style="color:#555">총 ${b.units?b.units+"호실":"-"} · 지상 ${b.floors||"-"}층${b.floors_b?"/지하"+b.floors_b:""}</span><br>
          관리 호실 ${a.n} · 계약 ${a.c}<br>
          <a style="color:#974726;cursor:pointer;font-weight:700" onclick="go('detail','${b.id}')">상세 영업관리 →</a>
        </div>`});
      kInfo.open(kmap);
    };
    const ov=new kakao.maps.CustomOverlay({position:pos,content:el,xAnchor:0.5,yAnchor:0.5});
    ov.setMap(kmap); kOverlays.push(ov); bounds.extend(pos); shown++;
  });
  if(shown)kmap.setBounds(bounds);
}
async function viewMap(){
  const V=$("view");
  if(!KAKAO_KEY()){ V.innerHTML=kakaoSetupHtml(); return; }
  V.innerHTML=`<div class="flex" style="justify-content:space-between;align-items:flex-start">
     <div><h1>지도</h1><div class="sub" id="mstat">건물 ${BUILDINGS.length}곳 · 핀 클릭 → 호실 영업관리</div></div>
     <div class="flex">
       <select id="mz"><option value="">전체 권역</option>${zonesList().map(z=>`<option>${z}</option>`).join("")}</select>
       <select id="mu"><option value="0">호실 전체</option><option value="100">100호+</option><option value="250">250호+</option><option value="500">500호+</option></select>
       <span class="badge" style="color:var(--mut)">핀 크기 = 호실수</span>
       <span class="badge"><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#9ca3af;margin-right:5px"></i>미접촉</span>
       <span class="badge"><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#bd5f37;margin-right:5px"></i>진행중</span>
       <span class="badge g"><i style="display:inline-block;width:9px;height:9px;border-radius:50%;background:#5f7a4a;margin-right:5px"></i>계약</span>
     </div></div>
   <div id="kmap" style="width:100%;height:70vh;border:1px solid var(--line);border-radius:12px"></div>`;
  try{ await loadKakao(); }
  catch(e){ if($("mstat"))$("mstat").textContent="지도 로드 실패 — 카카오 키/도메인 등록을 확인하세요.";
    if(e==="nokey"){V.innerHTML=kakaoSetupHtml();} return; }
  kmap=new kakao.maps.Map($("kmap"),{center:new kakao.maps.LatLng(37.5045,126.95),level:8});
  $("mz").onchange=drawPins; $("mu").onchange=drawPins;
  await ensureCoords();
  drawPins();
}

boot();
</script></body></html>
