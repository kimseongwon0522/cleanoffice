<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료 견적문의 - 클린 오피스</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg:#f6efe6; --card:#fffdf9; --ink:#2c2620; --sub:#837868;
  --clay:#a76a4c; --clay-d:#855137; --line:#e6dccd; --ok:#62794a;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Pretendard',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:460px;margin:0 auto;padding:0 18px 40px}
.top{background:var(--clay);color:#fff;text-align:center;padding:26px 18px 22px;
  border-radius:0 0 22px 22px}
.top .brand{font-size:13px;letter-spacing:2px;opacity:.9;font-weight:700}
.top h1{margin:6px 0 4px;font-size:25px;font-weight:800}
.top p{margin:0;font-size:13.5px;opacity:.92}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:20px 18px;margin-top:18px;box-shadow:0 6px 20px rgba(90,70,50,.06)}
label{display:block;font-size:13.5px;font-weight:700;margin:14px 0 6px}
label .req{color:var(--clay)}
input,select,textarea{width:100%;padding:12px 13px;border:1px solid var(--line);
  border-radius:10px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--clay)}
textarea{min-height:72px;resize:vertical}
.row{display:flex;gap:10px}.row>div{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:9px 14px;border:1px solid var(--line);border-radius:999px;background:#fff;
  font-size:14px;cursor:pointer;user-select:none}
.chip.on{background:var(--clay);color:#fff;border-color:var(--clay)}
.submit{width:100%;margin-top:22px;padding:15px;background:var(--clay);color:#fff;border:none;
  border-radius:12px;font-size:17px;font-weight:800;font-family:inherit;cursor:pointer}
.submit:disabled{opacity:.6}
.note{font-size:12px;color:var(--sub);text-align:center;margin-top:12px}
.foot{text-align:center;margin-top:26px;font-size:13px;color:var(--sub)}
.foot a{color:var(--clay-d);font-weight:700;text-decoration:none}
.trust{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 14px;margin-top:14px;
  font-size:12px;color:var(--sub)}
.done{display:none;text-align:center;padding:38px 20px}
.done .mk{width:64px;height:64px;border-radius:50%;background:var(--ok);color:#fff;
  font-size:34px;line-height:64px;margin:0 auto 14px}
.done h2{margin:0 0 8px;font-size:21px}
.done p{color:var(--sub);font-size:14.5px;margin:0 0 20px;line-height:1.6}
.btns{display:flex;gap:10px;justify-content:center}
.btns a{flex:1;max-width:180px;padding:13px;border-radius:11px;font-weight:700;
  text-decoration:none;font-size:15px}
.btns .call{background:var(--clay);color:#fff}
.btns .kakao{background:#FEE500;color:#3c1e1e}
.err{color:#c0392b;font-size:13px;text-align:center;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="top">
  <div class="brand">CLEAN OFFICE · 클린 오피스</div>
  <h1>무료 견적문의</h1>
  <p>30초면 완료! 빠른 견적을 받아보세요</p>
</div>

<div class="wrap">
  <form id="f" class="card" autocomplete="on">
    <label>업체명 / 담당자명 <span class="req">*</span></label>
    <input name="company" placeholder="예) (주)클린상사 / 김성원" required>

    <label>연락처 <span class="req">*</span></label>
    <input name="phone" type="tel" inputmode="tel" placeholder="010-0000-0000" required>

    <label>주소 (지식산업센터·호실) <span class="req">*</span></label>
    <input name="address" placeholder="예) 가산동 ○○지산 1503호" required>

    <div class="row">
      <div>
        <label>면적 (평)</label>
        <input name="area" type="number" inputmode="numeric" placeholder="예) 25">
      </div>
      <div>
        <label>청소 주기</label>
        <select name="frequency">
          <option value="">선택</option>
          <option>주 1회</option><option>주 2회</option><option>주 3회</option>
          <option>주 5회(매일)</option><option>격주 1회</option>
          <option>월 1회</option><option>1회성</option>
        </select>
      </div>
    </div>

    <label>청소 유형</label>
    <div class="chips" id="types">
      <span class="chip" data-v="사무실 정기청소">사무실 정기청소</span>
      <span class="chip" data-v="입주 청소">입주 청소</span>
      <span class="chip" data-v="상가 청소">상가 청소</span>
      <span class="chip" data-v="건물 관리">건물 관리</span>
      <span class="chip" data-v="기타">기타</span>
    </div>

    <label>요청사항</label>
    <textarea name="message" placeholder="예) 탕비실 위생 신경 써주세요 / 주말 작업 가능 문의"></textarea>

    <button class="submit" type="submit" id="btn">견적 문의하기</button>
    <div class="err" id="err"></div>
    <div class="note">입력하신 정보는 견적 목적으로만 사용됩니다.</div>

    <div class="trust">
      <span>✓ 배상책임보험 가입</span><span>✓ 같은 담당자 고정</span>
      <span>✓ 세금계산서 발행</span><span>✓ 친환경 세제</span>
    </div>
  </form>

  <div class="card done" id="done">
    <div class="mk">✓</div>
    <h2>문의가 접수되었습니다!</h2>
    <p>빠른 시간 안에 연락드리겠습니다.<br>감사합니다.</p>
    <div class="btns">
      <a class="call" href="tel:01090016067">📞 전화하기</a>
      <a class="kakao" href="http://pf.kakao.com/_clean_office" target="_blank" rel="noopener">💬 카카오톡</a>
    </div>
  </div>

  <div class="foot">
    <b>클린 오피스</b> · 서울·수도권 지식산업센터 사무실 정기청소<br>
    <a href="tel:01090016067">010-9001-6067</a> · © 2026
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// === Supabase 연동 (우리 앱과 같은 DB) ===
const SUPABASE_URL = "https://nivgbvkjuvujofadpcsx.supabase.co";
const SUPABASE_KEY = "sb_publishable_0fg4AX0sTTh10IimI9VJfg_ybP6o7o9"; // 공개용(publishable) 키 — leads는 입력만 허용(RLS)
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 출처 추적: ?src=qr / flyer / naver / blog ...
const src = new URLSearchParams(location.search).get("src") || "qr";

// 청소 유형 멀티 선택
const picked = new Set();
document.getElementById("types").addEventListener("click", e=>{
  const c = e.target.closest(".chip"); if(!c) return;
  c.classList.toggle("on");
  c.classList.contains("on") ? picked.add(c.dataset.v) : picked.delete(c.dataset.v);
});

const f = document.getElementById("f"), btn = document.getElementById("btn"), err = document.getElementById("err");
f.addEventListener("submit", async (e)=>{
  e.preventDefault();
  err.style.display="none";
  btn.disabled=true; btn.textContent="접수 중...";
  const d = Object.fromEntries(new FormData(f).entries());
  const row = {
    company: d.company?.trim(),
    phone: d.phone?.trim(),
    address: d.address?.trim(),
    area_pyeong: d.area ? parseInt(d.area,10) : null,
    frequency: d.frequency || null,
    clean_type: [...picked].join(", ") || null,
    message: d.message?.trim() || null,
    source: src
  };
  try{
    const { error } = await sb.from("leads").insert(row);
    if(error) throw error;
    f.style.display="none";
    document.getElementById("done").style.display="block";
    window.scrollTo({top:0, behavior:"smooth"});
  }catch(ex){
    btn.disabled=false; btn.textContent="견적 문의하기";
    err.textContent="전송에 실패했어요. 전화(010-9001-6067)로 문의 주시면 바로 도와드릴게요.";
    err.style.display="block";
    console.error(ex);
  }
});
</script>
</body>
</html>
